<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus AI - Premium Data Automation</title>
  <meta name="description" content="Unify, transform, and route your data with zero-friction pipelines. Engineered for scale, designed for humans.">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050505]">
  
  <div id="root"></div>

  <script type="text/babel" data-presets="react,typescript">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ============================================================================
    // ICONS
    // ============================================================================
    const DatabaseIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
      </svg>
    );

    const ZapIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
      </svg>
    );

    const LockIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
      </svg>
    );

    const SparklesIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
      </svg>
    );

    const ChevronIcon = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    );

    const CheckIcon = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    );

    // ============================================================================
    // DATA & STATE
    // ============================================================================
    const PRICING_DATA = {
      monthly: {
        starter: { INR: 999, USD: 12, EUR: 10 },
        professional: { INR: 2499, USD: 29, EUR: 25 },
        enterprise: { INR: 8999, USD: 99, EUR: 89 }
      }
    };

    const FEATURES = [
      {
        id: 'feat-1',
        title: 'Autonomous Data Parsing',
        description: 'Instantly convert unstructured chaos into pristine, structured datasets using our proprietary LLM router. Supports PDF, CSV, JSON, and messy text.',
        icon: <DatabaseIcon />,
        bentoClasses: 'lg:col-span-2 lg:row-span-2',
      },
      {
        id: 'feat-2',
        title: 'Real-time Sync',
        description: 'Bi-directional synchronization with your data warehouse in milliseconds.',
        icon: <ZapIcon />,
        bentoClasses: 'lg:col-span-1 lg:row-span-1',
      },
      {
        id: 'feat-3',
        title: 'Enterprise Security',
        description: 'SOC2 Type II compliant. End-to-end encryption with BYOK support.',
        icon: <LockIcon />,
        bentoClasses: 'lg:col-span-1 lg:row-span-1',
      },
      {
        id: 'feat-4',
        title: 'Predictive Schema Evolution',
        description: 'AI automatically detects upstream schema changes and intelligently adapts downstream pipelines.',
        icon: <SparklesIcon />,
        bentoClasses: 'lg:col-span-3 lg:row-span-1',
      }
    ];

    const pricingStore = {
      currency: 'USD',
      cycle: 'monthly',
      listeners: new Set(),
      subscribe(fn) {
        this.listeners.add(fn);
        return () => this.listeners.delete(fn);
      },
      notify() { this.listeners.forEach(fn => fn()); },
      setCurrency(c) { this.currency = c; this.notify(); },
      setCycle(c) { this.cycle = c; this.notify(); },
      getState() { return { currency: this.currency, cycle: this.cycle }; }
    };

    function usePricingState() {
      const [state, setState] = useState(pricingStore.getState());
      useEffect(() => pricingStore.subscribe(() => setState(pricingStore.getState())), []);
      return state;
    }

    // ============================================================================
    // COMPONENTS
    // ============================================================================
    const PricingToggle = React.memo(() => {
      const { cycle, currency } = usePricingState();
      return (
        <div className="flex flex-col items-center gap-6 mb-16">
          <div className="flex items-center p-1 rounded-full bg-white/5 border border-white/10 backdrop-blur-md relative">
            <div 
              className="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-full shadow-sm transition-transform duration-300 ease-out"
              style={{ transform: cycle === 'monthly' ? 'translateX(4px)' : 'translateX(calc(100% + 4px))' }}
            />
            {['monthly', 'annual'].map((c) => (
              <button
                key={c}
                onClick={() => pricingStore.setCycle(c)}
                className={`relative z-10 w-32 py-2 text-sm font-medium transition-colors duration-300 rounded-full ${cycle === c ? 'text-black' : 'text-gray-400 hover:text-white'}`}
              >
                {c.charAt(0).toUpperCase() + c.slice(1)}
                {c === 'annual' && <span className="absolute -top-3 -right-2 bg-emerald-500/20 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full border border-emerald-500/20">Save 20%</span>}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            {['USD', 'EUR', 'INR'].map((curr) => (
              <button
                key={curr}
                onClick={() => pricingStore.setCurrency(curr)}
                className={`px-3 py-1 text-xs font-semibold rounded-md transition-all ${currency === curr ? 'bg-white/20 text-white border border-white/30' : 'bg-transparent text-gray-500 border border-transparent hover:text-gray-300 hover:bg-white/5'}`}
              >
                {curr}
              </button>
            ))}
          </div>
        </div>
      );
    });

    const PriceDisplay = React.memo(({ tierKey }) => {
      const { currency, cycle } = usePricingState();
      const basePrice = PRICING_DATA.monthly[tierKey][currency];
      const calculatedPrice = cycle === 'annual' ? Math.floor((basePrice * 12 * 0.8) / 12) : basePrice;
      const symbol = currency === 'USD' ? '$' : currency === 'EUR' ? '€' : '₹';

      return (
        <div className="my-6">
          <div className="flex items-baseline text-5xl font-bold text-white tracking-tighter transition-all">
            <span className="text-3xl text-gray-400 mr-1">{symbol}</span>
            {calculatedPrice.toLocaleString()}
            <span className="text-lg text-gray-500 font-medium ml-2">/mo</span>
          </div>
          <div className="text-sm text-gray-500 mt-2 h-5">
            {cycle === 'annual' ? `Billed annually (${symbol}${(calculatedPrice * 12).toLocaleString()}/yr)` : 'Billed monthly'}
          </div>
        </div>
      );
    });

    const PricingCard = React.memo(({ tierKey, title, description, features, highlighted }) => (
      <div className={`relative p-8 rounded-3xl border flex flex-col ${highlighted ? 'bg-blue-900/10 border-blue-500/50 shadow-xl' : 'bg-white/5 border-white/10'}`}>
        <h3 className="text-xl font-semibold text-white">{title}</h3>
        <p className="text-sm text-gray-400 mt-2">{description}</p>
        <PriceDisplay tierKey={tierKey} />
        <button className={`w-full py-3 rounded-xl font-medium mb-8 ${highlighted ? 'bg-white text-black hover:bg-gray-200' : 'bg-white/10 text-white hover:bg-white/20'}`}>
          Get Started
        </button>
        <ul className="space-y-4 flex-1">
          {features.map((feat, i) => (
            <li key={i} className="flex items-start gap-3 text-sm text-gray-300">
              <CheckIcon className="w-5 h-5 text-blue-400 shrink-0" />{feat}
            </li>
          ))}
        </ul>
      </div>
    ));

    // ============================================================================
    // MAIN APP
    // ============================================================================
    function App() {
      const [activeId, setActiveId] = useState('feat-3');

      return (
        <div className="min-h-screen bg-[#050505] text-white font-sans selection:bg-blue-500/30">
          {/* Header */}
          <header className="fixed top-0 w-full z-40 bg-black/50 backdrop-blur-xl border-b border-white/5 h-20 flex items-center px-6">
            <div className="max-w-7xl mx-auto w-full flex justify-between items-center">
              <span className="text-white font-bold text-xl flex items-center gap-2">
                <div className="w-8 h-8 bg-white text-black flex items-center justify-center rounded">N</div> Nexus
              </span>
              <button className="bg-white text-black px-6 py-2 rounded-full font-medium hover:scale-105 transition">Start for free</button>
            </div>
          </header>

          {/* Hero */}
          <section className="pt-48 pb-32 px-6 text-center max-w-5xl mx-auto">
             <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-sm text-gray-300 mb-8 backdrop-blur-md shadow-inner">
               <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Nexus 2.0 is now live
             </div>
            <h1 className="text-5xl md:text-7xl font-bold mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500 tracking-tighter">
              Data automation <br className="hidden md:block" /> at the speed of thought.
            </h1>
            <p className="text-xl text-gray-400 mb-10 max-w-2xl mx-auto leading-relaxed">
              Unify, transform, and route your data with zero-friction pipelines. 
              Built for scale, engineered for performance, designed for humans.
            </p>
            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
              <button className="w-full sm:w-auto h-12 px-8 rounded-full bg-white text-black font-semibold hover:scale-105 transition-transform">Get Started</button>
              <button className="w-full sm:w-auto h-12 px-8 rounded-full bg-white/5 border border-white/10 text-white font-semibold hover:bg-white/10 transition-colors">Read Docs</button>
            </div>
          </section>

          {/* Features - Desktop Bento / Mobile Accordion */}
          <section className="py-20 px-6 max-w-7xl mx-auto">
            <h2 className="text-3xl md:text-5xl font-bold text-center mb-16 tracking-tight">Engineered for complexity.</h2>
            <div className="flex flex-col lg:grid lg:grid-cols-3 lg:grid-rows-2 gap-6">
              {FEATURES.map((feature) => {
                const isActive = activeId === feature.id;
                return (
                  <div
                    key={feature.id}
                    onClick={() => setActiveId(isActive ? '' : feature.id)}
                    className={`cursor-pointer group relative overflow-hidden rounded-3xl border transition-all duration-500 p-8 ${feature.bentoClasses} ${isActive ? 'border-blue-500/50 bg-blue-900/10' : 'border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20'}`}
                  >
                    <div className="flex justify-between items-center mb-4">
                      <div className={`w-12 h-12 rounded-xl flex items-center justify-center transition-colors ${isActive ? 'bg-blue-500/20 text-blue-400' : 'bg-white/10 text-gray-400 group-hover:text-white'}`}>
                        {feature.icon}
                      </div>
                      <div className="lg:hidden text-gray-500"><ChevronIcon className={isActive ? 'rotate-180 text-white' : ''} /></div>
                    </div>
                    <h3 className={`text-2xl font-semibold mb-2 transition-colors ${isActive ? 'text-white' : 'text-gray-200 group-hover:text-white'}`}>{feature.title}</h3>
                    <div className={`grid transition-all duration-500 ${isActive ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0 lg:grid-rows-[1fr] lg:opacity-70'}`}>
                      <div className="overflow-hidden">
                        <p className="text-gray-400 mt-2">{feature.description}</p>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          {/* Pricing */}
          <section className="py-20 px-6 max-w-7xl mx-auto border-t border-white/5">
            <h2 className="text-3xl md:text-5xl font-bold text-center mb-12 tracking-tight">Transparent pricing.</h2>
            <PricingToggle />
            <div className="grid md:grid-cols-3 gap-8">
              <PricingCard tierKey="starter" title="Starter" description="Perfect for indie hackers and small startups." features={['1M rows processed/mo', 'Basic Transformations', '48hr Data Retention']} />
              <PricingCard tierKey="professional" title="Professional" description="For growing teams with complex data needs." highlighted={true} features={['50M rows processed/mo', 'Advanced ML Routing', 'Priority Email Support']} />
              <PricingCard tierKey="enterprise" title="Enterprise" description="Uncapped performance for global scale." features={['Unlimited processing', 'SOC2 / HIPAA Compliance', 'SLA Guarantee']} />
            </div>
          </section>

          {/* Footer */}
          <footer className="border-t border-white/10 pt-10 pb-10 text-center text-sm text-gray-600">
             © 2026 Nexus Data Systems Inc. Built for the Hackathon.
          </footer>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
